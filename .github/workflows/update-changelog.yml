name: Update CHANGELOG

on:
  push:
    branches: [main]
    paths-ignore:
      - CHANGELOG.md  # avoid infinite loop

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install --frozen-lockfile || bun install

      - name: Generate CHANGELOG.md
        run: bun src/cli.ts --out CHANGELOG.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet CHANGELOG.md || (git add CHANGELOG.md && git commit -m "chore: update CHANGELOG.md [skip ci]" && git push)

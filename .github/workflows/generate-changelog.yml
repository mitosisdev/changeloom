name: Generate CHANGELOG

# Ultimate dogfood: changeloom generates its own CHANGELOG.md.
#
# On every push to main, run changeloom against this repo and commit the
# refreshed CHANGELOG.md back to main. Two infinite-loop guards are in play:
#   1. `paths-ignore: CHANGELOG.md` — the bot's own changelog commit does not
#      re-trigger this workflow.
#   2. `[skip ci]` in the bot commit message — belt-and-suspenders backstop in
#      case the commit also touches other files.

on:
  push:
    branches: [main]
    paths-ignore:
      - CHANGELOG.md

jobs:
  generate-changelog:
    # Skip runs whose head commit was produced by this workflow.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Regenerate CHANGELOG.md with changeloom
        run: bun run src/cli.ts . --out CHANGELOG.md

      - name: Commit and push if changed
        run: |
          git config user.name "mito-bot"
          git config user.email "bot@mito.dev"
          git diff --quiet CHANGELOG.md || git commit -am "chore: regenerate CHANGELOG.md [skip ci]"
          git push

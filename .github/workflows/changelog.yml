name: Self-Generated CHANGELOG

# Maximum dogfood: changeloom generates its own CHANGELOG.md.
# On every push to main, run changeloom against this repo and commit the
# refreshed changelog. The CHANGELOG.md path is ignored on trigger so the
# bot's own commit doesn't kick off another run (infinite-loop guard), with
# [skip ci] on the commit message as a belt-and-suspenders backstop.

on:
  push:
    branches: [main]
    paths-ignore:
      - CHANGELOG.md

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install --frozen-lockfile || bun install

      - name: Generate CHANGELOG.md with changeloom
        run: bun run src/cli.ts --out CHANGELOG.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet CHANGELOG.md || (git add CHANGELOG.md && git commit -m "chore: update CHANGELOG.md [skip ci]" && git push)
